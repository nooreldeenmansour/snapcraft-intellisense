name: Sync Schema and Release

on:
  schedule:
    # Run twice weekly on Monday and Thursday at 00:00 UTC
    - cron: "0 0 * * 1,4"
  push:
    branches: [main]
    paths:
      # Trigger when sync script changes (may affect schema generation)
      - "scripts/sync.py"
  workflow_dispatch:
    inputs:
      force_release:
        description: "Force a new release even if schema unchanged"
        required: false
        type: boolean
        default: false

# Prevent concurrent runs to avoid race conditions
concurrency:
  group: sync-and-release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync-schema:
    runs-on: ubuntu-latest
    outputs:
      schema_changed: ${{ steps.check_changes.outputs.changed }}
      script_changed: ${{ steps.check_script.outputs.changed }}
      new_version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Sync schema from upstream
        run: uv run scripts/sync.py

      - name: Validate synced schema
        if: success()
        run: |
          # Validate JSON syntax
          python3 -c "import json; json.load(open('schemas/snapcraft.json'))"

          # Check required fields
          python3 << 'VALIDATION'
          import json
          import sys

          with open('schemas/snapcraft.json', 'r') as f:
              schema = json.load(f)

          required_fields = ['$schema', '$id', 'title', 'description']
          missing = [f for f in required_fields if f not in schema]

          if missing:
              print(f"Missing required fields: {missing}")
              sys.exit(1)

          if not schema.get('$defs'):
              print("Warning: No $defs found in schema")

          print("Schema validation passed!")
          print(f"  - Title: {schema.get('title', 'N/A')}")
          print(f"  - Definitions: {len(schema.get('$defs', {}))}")
          VALIDATION

      - name: Check extension links
        if: success()
        uses: ./.github/actions/link-check
        with:
          title-suffix: "Schema Sync"

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet schemas/snapcraft.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No schema changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Schema changes detected"
            echo "Changes:"
            git diff --stat schemas/snapcraft.json
          fi

      - name: Check if sync script changed
        id: check_script
        run: |
          # Check if sync.py was modified in this commit
          if git diff HEAD~1..HEAD --name-only | grep -q "scripts/sync.py"; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Sync script changed"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Sync script not changed"
          fi

      - name: Calculate new version
        id: version
        if: steps.check_changes.outputs.changed == 'true' || steps.check_script.outputs.changed == 'true' || github.event.inputs.force_release == 'true'
        run: |
          # Get current version from package.json
          CURRENT_VERSION=$(jq -r '.version' package.json)
          echo "Current version: $CURRENT_VERSION"

          # Validate version format
          if ! [[ $CURRENT_VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $CURRENT_VERSION"
            exit 1
          fi

          # Parse version components
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}

          # Increment patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Save to environment for subsequent steps
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Update package.json version
        if: steps.check_changes.outputs.changed == 'true' || steps.check_script.outputs.changed == 'true' || github.event.inputs.force_release == 'true'
        run: |
          jq '.version = "${{ steps.version.outputs.version }}"' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Update pyproject.toml version
        if: steps.check_changes.outputs.changed == 'true' || steps.check_script.outputs.changed == 'true' || github.event.inputs.force_release == 'true'
        run: |
          # Use Python to safely update version in [project] section only
          python3 << 'PYTHON_EOF'
          import re

          with open('pyproject.toml', 'r') as f:
              lines = f.readlines()

          # Find and update version in [project] section
          in_project_section = False
          updated = False

          for i, line in enumerate(lines):
              if line.strip().startswith('[project]'):
                  in_project_section = True
              elif line.strip().startswith('[') and in_project_section:
                  # We've left the [project] section
                  in_project_section = False

              if in_project_section and line.startswith('version = "') and not updated:
                  lines[i] = f'version = "${{ steps.version.outputs.version }}"\n'
                  updated = True
                  break

          with open('pyproject.toml', 'w') as f:
              f.writelines(lines)

          print("✅ Updated version in [project] section")
          PYTHON_EOF

      - name: Update uv.lock
        if: steps.check_changes.outputs.changed == 'true' || steps.check_script.outputs.changed == 'true' || github.event.inputs.force_release == 'true'
        run: uv lock

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true' || steps.check_script.outputs.changed == 'true' || github.event.inputs.force_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Commit changes
          git add schemas/snapcraft.json package.json pyproject.toml uv.lock
          git commit -m "chore: sync schema from upstream snapcraft (v${{ steps.version.outputs.version }})"

          # Create annotated tag BEFORE pushing
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"

          # Push commit and tags together atomically
          git push origin main --follow-tags

          echo "✅ Pushed commit and tag v${{ steps.version.outputs.version }}"

  create-release:
    needs: sync-schema
    if: needs.sync-schema.outputs.schema_changed == 'true' || needs.sync-schema.outputs.script_changed == 'true' || github.event.inputs.force_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository at tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.sync-schema.outputs.new_version }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run compile

      - name: Package extension
        run: npx @vscode/vsce package

      - name: Generate release notes
        id: release_notes
        run: |
          # Get commit messages since last release
          PREVIOUS_TAG=$(git tag -l 'v*' --sort=-version:refname | head -2 | tail -1)

          if [ -z "$PREVIOUS_TAG" ]; then
            COMMIT_RANGE="HEAD~5..HEAD"
            COMMITS_TITLE="Recent updates"
          else
            COMMIT_RANGE="${PREVIOUS_TAG}..HEAD"
            COMMITS_TITLE="Changes since $PREVIOUS_TAG"
          fi

          # Get commit messages (excluding merge commits and the auto-sync message)
          COMMIT_LOG=$(git log $COMMIT_RANGE --pretty=format:"- %s (%an)" | grep -v "chore: sync schema" | head -10)

          # Get schema stats
          SCHEMA_DEFS=$(jq '.["$defs"] | length' schemas/snapcraft.json 2>/dev/null || echo "N/A")
          SCHEMA_PROPS=$(jq '.properties | length' schemas/snapcraft.json 2>/dev/null || echo "N/A")

          # Format release notes
          cat > /tmp/release_body.txt << 'EOF'
          ## 🎉 Snapcraft IntelliSense v${{ needs.sync-schema.outputs.new_version }}

          This release updates the Snapcraft YAML schema with the latest definitions from the [canonical/snapcraft](https://github.com/canonical/snapcraft) repository, providing enhanced IntelliSense and validation for VS Code.

          ### 📋 What's Included

          **Schema Update:**
          - ✅ Synced latest snapcraft.yaml schema from official Snapcraft documentation
          - 📊 **Schema Coverage:** $SCHEMA_DEFS definitions, $SCHEMA_PROPS top-level properties
          - 🔍 Full validation with IntelliSense completion
          - 📎 Hover documentation links for all fields

          **Recent Updates:**
          $COMMIT_LOG

          ### 🚀 Features

          - **IntelliSense & Autocomplete** - Full property and value completion for snapcraft.yaml
          - **Schema Validation** - Real-time validation with clear error messages
          - **Hover Documentation** - Interactive links to official Snapcraft documentation
          - **Interface Support** - Complete autocomplete for all Snapcraft plugs and slots

          ### 📦 Installation

          **Option 1: VS Code Marketplace**

          Install directly from the [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=nooreldeensalah.snapcraft-intellisense) or search for "Snapcraft Intellisense" in the Extensions panel.

          **Option 2: Manual Installation**

          Download the `.vsix` file from this release and install it using:
          ```bash
          code --install-extension snapcraft-intellisense-*.vsix
          ```

          ### 📚 Documentation

          - [**Snapcraft YAML Reference**](https://documentation.ubuntu.com/snapcraft/stable/reference/project-file/snapcraft-yaml/)
          - [**Plugin Reference**](https://documentation.ubuntu.com/snapcraft/stable/reference/plugins/)
          - [**Interface Reference**](https://snapcraft.io/docs/supported-interfaces)
          - [**Project Repository**](https://github.com/nooreldeensalah/snapcraft-intellisense)

          ### 💡 Tips

          - Use `Ctrl+Space` (or `Cmd+Space` on macOS) to trigger IntelliSense
          - Hover over any property to see documentation and examples
          - Use the Command Palette (`Ctrl+Shift+P`) and search for "Snapcraft" to access commands

          ---
          *Happy snapping! 🛠️*
          EOF

          # Replace placeholders and output to environment
          cat /tmp/release_body.txt | sed "s|\${{ needs.sync-schema.outputs.new_version }}|${{ needs.sync-schema.outputs.new_version }}|g" | sed "s|\$SCHEMA_DEFS|$SCHEMA_DEFS|g" | sed "s|\$SCHEMA_PROPS|$SCHEMA_PROPS|g" > /tmp/release_final.txt

          # Store for use in release
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/release_final.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.sync-schema.outputs.new_version }}
          name: v${{ needs.sync-schema.outputs.new_version }}
          body: ${{ steps.release_notes.outputs.release_notes }}
          files: |
            *.vsix
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to VS Code Marketplace
  publish-marketplace:
    needs: [sync-schema, create-release]
    if: needs.sync-schema.outputs.schema_changed == 'true' || needs.sync-schema.outputs.script_changed == 'true' || github.event.inputs.force_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository at tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.sync-schema.outputs.new_version }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run compile

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Verify publication
        if: success()
        run: |
          echo "Successfully published v${{ needs.sync-schema.outputs.new_version }} to VS Code Marketplace!"
          echo "View at: https://marketplace.visualstudio.com/items?itemName=nooreldeensalah.snapcraft-intellisense"
