name: "Link Check"
description: "Check links using lychee and create issues for broken links"

inputs:
  title-suffix:
    description: "Suffix for the issue title"
    required: true
    default: "Extension URLs"

runs:
  using: "composite"
  steps:
    - name: Extract extension URLs
      shell: bash
      run: python3 scripts/extract_urls.py > .lychee-urls.txt

    - name: Setup lychee cache
      uses: actions/cache@v4
      with:
        path: .lycheecache
        key: cache-lychee-${{ runner.os }}-${{ hashFiles('.lychee-urls.txt') }}
        restore-keys: |
          cache-lychee-${{ runner.os }}-

    - name: Check extension links
      id: lychee
      uses: lycheeverse/lychee-action@v2
      continue-on-error: true
      with:
        args: >-
          --cache
          --max-cache-age 1d
          --accept 200,204
          --timeout 30
          --max-retries 3
          .lychee-urls.txt
        output: ./lychee/out.md
        fail: true
        jobSummary: true

    - name: Create issue for broken links
      if: steps.lychee.outputs.exit_code != 0
      uses: peter-evans/create-issue-from-file@v5
      with:
        title: "Link Checker Report - ${{ inputs.title-suffix }}"
        content-filepath: ./lychee/out.md
        labels: bug, link-checker, automated
